name: Docker Image CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: vars
        run: echo "tag=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Harbor secrets
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          if [ -z "$HARBOR_USER" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_USER or HARBOR_PASSWORD is empty."
            exit 1
          fi

      - name: Login to Harbor Registry
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail

          HARBOR_USER_CLEAN="$(printf '%s' "$HARBOR_USER" | tr -d '\r\n')"
          # Allow secrets saved as "robot$name" or 'robot$name' by stripping wrapper quotes.
          HARBOR_USER_CLEAN="$(printf '%s' "$HARBOR_USER_CLEAN" | sed -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")"
          HARBOR_PASSWORD_CLEAN="$(printf '%s' "$HARBOR_PASSWORD" | tr -d '\r\n')"
          HARBOR_PASSWORD_CLEAN="$(printf '%s' "$HARBOR_PASSWORD_CLEAN" | sed -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")"

          echo "Harbor user length: ${#HARBOR_USER_CLEAN}"
          if [ "$HARBOR_USER" != "$HARBOR_USER_CLEAN" ] || [ "$HARBOR_PASSWORD" != "$HARBOR_PASSWORD_CLEAN" ]; then
            echo "Detected trailing newlines in Harbor secrets and removed them."
          fi

          if printf '%s' "$HARBOR_PASSWORD_CLEAN" | docker login hub.ncsa.illinois.edu --username "${HARBOR_USER_CLEAN}" --password-stdin; then
            exit 0
          fi

          # If username was stored as robot\$name, try unescaping to robot$name.
          HARBOR_USER_UNESCAPED="${HARBOR_USER_CLEAN//\\$/\$}"
          if [ "$HARBOR_USER_UNESCAPED" != "$HARBOR_USER_CLEAN" ]; then
            echo "Retrying Harbor login with unescaped username."
            if printf '%s' "$HARBOR_PASSWORD_CLEAN" | docker login hub.ncsa.illinois.edu --username "${HARBOR_USER_UNESCAPED}" --password-stdin; then
              exit 0
            fi
          fi

          echo "Harbor login failed (unauthorized)."
          echo "Set HARBOR_USER exactly as Harbor shows it (for robots: robot\$name, not escaped), and use that account's CLI token/secret."
          echo "Also verify push permission to gies-dsrs/buildathon."
          exit 1

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            hub.ncsa.illinois.edu/gies-dsrs/buildathon:${{ steps.vars.outputs.tag }}
            hub.ncsa.illinois.edu/gies-dsrs/buildathon:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
