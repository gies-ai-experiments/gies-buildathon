name: Docker Image CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: vars
        run: echo "tag=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Harbor secrets
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          if [ -z "$HARBOR_USER" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_USER or HARBOR_PASSWORD is empty."
            exit 1
          fi

      - name: Login to Harbor Registry
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          printf '%s' "$HARBOR_PASSWORD" | docker login hub.ncsa.illinois.edu --username "$HARBOR_USER" --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            hub.ncsa.illinois.edu/gies-dsrs/buildathon:${{ steps.vars.outputs.tag }}
            hub.ncsa.illinois.edu/gies-dsrs/buildathon:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
